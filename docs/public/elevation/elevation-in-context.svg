<svg xmlns="http://www.w3.org/2000/svg" viewBox="-14 0 874 462" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
  <style>
    .label { fill: #333; }
    .label-line { stroke: #333; }
    @media (prefers-color-scheme: dark) {
      .label { fill: #999; }
      .label-line { stroke: #999; }
    }
  </style>
  <defs>
    <!-- The one remaining tier: a surface that has left the page and floats above it. -->
    <filter id="overlay" x="-8%" y="-8%" width="116%" height="124%">
      <feDropShadow dx="0" dy="0.1" stdDeviation="0.1" flood-color="#000" flood-opacity="0.32"/>
      <feDropShadow dx="0" dy="1" stdDeviation="0.9" flood-color="#000" flood-opacity="0.26"/>
      <feDropShadow dx="-0.1" dy="4" stdDeviation="3.6" flood-color="#000" flood-opacity="0.2"/>
      <feDropShadow dx="-0.2" dy="12" stdDeviation="10.8" flood-color="#000" flood-opacity="0.14"/>
    </filter>
    <!-- ui-soft: near-white convex cap. The gradient + darker ring are the lift, no drop shadow. -->
    <linearGradient id="soft-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="oklch(0.998 0.001 54)"/>
      <stop offset="100%" stop-color="oklch(0.985 0.002 54)"/>
    </linearGradient>
    <!-- ui-contrast: dark bold cap. Same recipe, retinted around primary. -->
    <linearGradient id="contrast-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="oklch(0.22 0.008 54)"/>
      <stop offset="100%" stop-color="oklch(0.15 0.008 54)"/>
    </linearGradient>
    <!-- Chevron down icon for select -->
    <path id="chevron" d="M0,0 L4,4 L8,0" fill="none" stroke="oklch(0.52 0.008 54)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </defs>

  <!-- Page ground (bg-background = charcoal-100: the gray base, stays visible in dark mode) -->
  <rect x="160" y="0" width="540" height="462" rx="10" fill="oklch(0.965 0.003 54)"/>

  <!-- Card: separates from the ground by fill alone (white on the deeper page), traced by a
       whisper-light surface-border rim. No drop shadow. -->
  <rect x="220" y="28" width="420" height="406" rx="12" fill="#fff" stroke="oklch(0.15 0.008 54 / 0.13)" stroke-width="1"/>

  <!-- Card heading -->
  <text x="252" y="70" font-size="16" font-weight="600" font-family="system-ui, -apple-system, sans-serif" fill="oklch(0.22 0.008 54)">New event</text>
  <text x="252" y="90" font-size="12" font-family="system-ui, -apple-system, sans-serif" fill="oklch(0.52 0.008 54)">Fill in the details to create your event.</text>

  <!-- Event name input: a flat well (ui-control), the dense control-border hairline, no shadow -->
  <text x="252" y="126" font-size="12" font-family="system-ui, -apple-system, sans-serif" fill="oklch(0.22 0.008 54)">Event name</text>
  <rect x="252" y="134" width="356" height="36" rx="6" fill="#fff" stroke="oklch(0.15 0.008 54 / 0.26)" stroke-width="1"/>
  <text x="264" y="157" font-size="13" font-family="system-ui, -apple-system, sans-serif" fill="oklch(0.22 0.008 54)">Summer Festival</text>

  <!-- Category select: a flat well too, and the trigger for the menu -->
  <text x="252" y="196" font-size="12" font-family="system-ui, -apple-system, sans-serif" fill="oklch(0.22 0.008 54)">Category</text>
  <rect x="252" y="204" width="356" height="36" rx="6" fill="#fff" stroke="oklch(0.15 0.008 54 / 0.26)" stroke-width="1"/>
  <text x="264" y="227" font-size="13" font-family="system-ui, -apple-system, sans-serif" fill="oklch(0.52 0.008 54)">Select a category...</text>
  <use href="#chevron" x="588" y="218"/>

  <!-- Menu: the one floating element. Left the page, so it is the single layer that casts a
       shadow (shadow-elevation-overlay). It floats over the empty lower card, above the caps. -->
  <rect x="252" y="246" width="356" height="108" rx="10" fill="#fff" stroke="oklch(0.15 0.008 54 / 0.13)" stroke-width="1" filter="url(#overlay)"/>
  <rect x="260" y="256" width="340" height="30" rx="6" fill="#0000000a"/>
  <text x="276" y="275" font-size="13" font-family="system-ui, -apple-system, sans-serif" fill="oklch(0.22 0.008 54)">Concert</text>
  <text x="276" y="310" font-size="13" font-family="system-ui, -apple-system, sans-serif" fill="oklch(0.22 0.008 54)">Festival</text>
  <text x="276" y="344" font-size="13" font-family="system-ui, -apple-system, sans-serif" fill="oklch(0.22 0.008 54)">Exhibition</text>

  <!-- Raised caps sitting in flow: the lift is the cap's own shading, not a shadow. -->
  <!-- Cancel: ui-soft (light neutral cap) -->
  <rect x="414" y="362" width="90" height="40" rx="8" fill="url(#soft-bg)" stroke="oklch(0.8 0.005 54)" stroke-width="1"/>
  <line x1="415" y1="363" x2="503" y2="363" stroke="oklch(1 0 0 / 0.9)" stroke-width="1" stroke-linecap="round"/>
  <text x="436" y="387" font-size="13" font-weight="500" font-family="system-ui, -apple-system, sans-serif" fill="oklch(0.22 0.008 54)">Cancel</text>
  <!-- Create: ui-contrast (dark bold cap) -->
  <rect x="512" y="362" width="96" height="40" rx="8" fill="url(#contrast-bg)"/>
  <line x1="513" y1="363" x2="607" y2="363" stroke="oklch(0.45 0.006 54)" stroke-opacity="0.25" stroke-width="1" stroke-linecap="round"/>
  <text x="536" y="387" font-size="13" font-weight="500" font-family="system-ui, -apple-system, sans-serif" fill="oklch(0.985 0.002 54)">Create</text>

  <!-- ====== LEFT-SIDE ANNOTATIONS ====== -->

  <!-- bg-background -->
  <circle cx="195" cy="18" r="2.5" class="label"/>
  <line x1="192" y1="18" x2="155" y2="18" class="label-line" stroke-width="1"/>
  <text x="150" y="22" font-size="11" font-weight="600" class="label" text-anchor="end">bg-background</text>

  <!-- overlay on menu (the one shadow) -->
  <circle cx="250" cy="300" r="2.5" class="label"/>
  <line x1="247" y1="300" x2="155" y2="300" class="label-line" stroke-width="1"/>
  <text x="150" y="296" font-size="11" font-weight="600" class="label" text-anchor="end">ui-surface</text>
  <text x="150" y="310" font-size="11" font-weight="600" class="label" text-anchor="end">shadow-elevation-overlay</text>

  <!-- ====== RIGHT-SIDE ANNOTATIONS ====== -->

  <!-- card separates by fill -->
  <circle cx="642" cy="42" r="2.5" class="label"/>
  <line x1="645" y1="42" x2="675" y2="42" class="label-line" stroke-width="1"/>
  <text x="680" y="39" font-size="11" font-weight="600" class="label">ui-surface</text>
  <text x="680" y="53" font-size="11" font-weight="600" class="label">separates by fill</text>

  <!-- input is a flat well -->
  <circle cx="610" cy="152" r="2.5" class="label"/>
  <line x1="613" y1="152" x2="675" y2="152" class="label-line" stroke-width="1"/>
  <text x="680" y="149" font-size="11" font-weight="600" class="label">ui-control</text>
  <text x="680" y="163" font-size="11" font-weight="600" class="label">flat well, no shadow</text>

  <!-- raised caps -->
  <circle cx="610" cy="384" r="2.5" class="label"/>
  <line x1="613" y1="384" x2="675" y2="384" class="label-line" stroke-width="1"/>
  <text x="680" y="381" font-size="11" font-weight="600" class="label">ui-soft / ui-contrast</text>
  <text x="680" y="395" font-size="11" font-weight="600" class="label">raised caps, no shadow</text>
</svg>
