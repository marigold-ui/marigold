title: Pick records from a collection into a report
brief: >-
  A report that owns the venues picked for it. A trigger opens a Dialog with a
  search field, type, region, and status filters, a running result count, and a
  wide multi-select Table (region, capacity, status badge, day rate) in a
  bounded, sticky Scrollable region. Staged venues stay visible as a removable
  Tag.Group rail through every search and filter, so narrowing the list never
  drops a pick. The commit footer carries the staged count, and confirming
  persists the set on the report, which can be re-opened pre-staged to edit. The
  density is the case a fullscreen dialog serves better than a large one.
patterns:
  - user-input/pick
key_files:
  - PickVenuesDialog.tsx
  - ReportVenues.tsx
  - venues.ts
scaffolding_files:
  - page.tsx
peer_deps:
  - '@react-types/shared'
