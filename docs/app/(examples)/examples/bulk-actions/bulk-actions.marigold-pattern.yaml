title: Bulk actions on an events table
brief: >-
  A paginated, searchable events table where users select many records and run
  one operation across all of them from a floating action bar: direct publish
  with a partial-failure retry loop, multi-field bulk edit in a drawer with
  mixed-values handling, CSV export, per-record progress feedback, and a
  confirmed destructive delete. Search, filter, and page state live in the URL;
  the selection is page-bounded and clears whenever the visible scope changes.
patterns:
  - user-input/bulk-actions
mock_data:
  - alias: '@/lib/data/events'
    shape: |
      // Replace with the consumer's own data source. `venue: null` marks an
      // event that cannot be published yet (the demo's deterministic
      // partial-failure path).
      export const eventStatuses: readonly ['Draft', 'On sale', 'Archived'];
      export const eventVenues: readonly string[];
      export const eventCategories: readonly string[];
      export const events: Array<{
        id: string;
        name: string;
        date: string;
        venue: string | null;
        category: string;
        price: number;
        status: 'Draft' | 'On sale' | 'Archived';
        reservations: number;
      }>;
key_files:
  - EventsTable.tsx
  - BulkActionBar.tsx
  - BulkEditDrawer.tsx
  - Toolbar.tsx
  - EventsPagination.tsx
  - FetchingIndicator.tsx
  - csv.ts
scaffolding_files:
  - page.tsx
peer_deps:
  - '@marigold/icons'
  - '@marigold/system'
  - nuqs
  - zod
