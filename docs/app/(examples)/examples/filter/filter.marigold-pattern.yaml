title: Filterable data table with quick filters and applied-filter chips
brief: >-
  A searchable, filterable venues table with instant quick filters in the
  filter bar (multi-select and single-select Selects), a Drawer-based filter
  form grouped into Accordion sections with active-count badges, live
  per-option counts and a "Show N results" preview on Apply, and removable
  "applied filter" chips. Filter and search state is synced to the URL query
  string so views are shareable and survive reloads.
patterns:
  - user-input/filter
mock_data:
  - alias: '@/lib/data/venues'
    shape: |
      // Replace with the consumer's own data source. `type` indexes into
      // `venueTypes`; `amenities`/`parking` index into their option arrays.
      export const venueTypes: readonly string[];
      export const venueTraits: readonly string[];
      export const amenitiesOptions: readonly string[];
      export const parkingOptions: readonly string[];
      export const seatingTypeOptions: readonly string[];
      export const venues: Array<{
        id: string;
        name: string;
        type: number;
        street: string;
        city: string;
        country: string;
        capacity: number;
        price: { from: number; to: number };
        rating: number;
        traits: string[];
        amenities: number[];
        parking: number[];
        seatingTypes: number[];
      }>;
key_files:
  - VenuesTable.tsx
  - FilterBar.tsx
  - AppliedFilter.tsx
  - VenuesPagination.tsx
  - FetchingIndicator.tsx
  - csv.ts
scaffolding_files:
  - page.tsx
peer_deps:
  - '@marigold/icons'
  - '@marigold/system'
  - nuqs
  - zod
