name: Test

on: ['push']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Unit tests (vitest browser-mode, Firefox)
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CI: true
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4.2.0
      - name: Setup Node (using .node-version)
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm exec playwright --version)" >> $GITHUB_OUTPUT
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.playwright-version.outputs.version }}-${{ runner.os }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install

      - name: Cache Vite dep optimization
        uses: actions/cache@v4
        with:
          path: node_modules/.vite
          key: vite-deps-unit-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            vite-deps-unit-${{ runner.os }}-

      - name: Run Unit Tests
        run: pnpm vitest run --project=unit-tests --coverage --coverage.thresholds.100=false --coverage.thresholds.statements=0 --coverage.thresholds.branches=0 --coverage.thresholds.functions=0 --coverage.thresholds.lines=0

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-unit
          path: coverage/coverage-final.json

  # ---------------------------------------------------------------------------
  # Storybook component tests (vitest browser-mode, Firefox)
  # ---------------------------------------------------------------------------
  storybook-tests:
    name: Storybook Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CI: true
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4.2.0
      - name: Setup Node (using .node-version)
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm exec playwright --version)" >> $GITHUB_OUTPUT
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.playwright-version.outputs.version }}-${{ runner.os }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install

      - name: Cache Vite dep optimization
        uses: actions/cache@v4
        with:
          path: node_modules/.vite
          key: vite-deps-sb-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            vite-deps-sb-${{ runner.os }}-

      - name: Run Storybook Tests
        run: pnpm vitest run --project=storybook-tests --coverage --coverage.thresholds.100=false --coverage.thresholds.statements=0 --coverage.thresholds.branches=0 --coverage.thresholds.functions=0 --coverage.thresholds.lines=0

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-storybook
          path: coverage/coverage-final.json

      - name: Upload Accessibility Report
        id: artifact-upload-step
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: accessibility-report
          path: ./storybook/artifacts/accessibilityReport.html
          overwrite: 'true'

  # ---------------------------------------------------------------------------
  # Merge coverage & report
  # ---------------------------------------------------------------------------
  coverage-report:
    name: Coverage Report
    needs: [unit-tests, storybook-tests]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      CI: true
      PR_NUMBER: ${{ github.event.number }}
      GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
      GIST_ID: ${{ secrets.GIST_ID }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node (using .node-version)
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'

      # Download coverage artifacts into separate directories
      - name: Download unit test coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit
          path: coverage/unit
      - name: Download storybook test coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-storybook
          path: coverage/storybook

      # Merge Istanbul coverage JSONs
      - name: Merge coverage reports
        run: |
          mkdir -p .nyc_output
          # Copy both coverage-final.json files with unique names
          cp coverage/unit/coverage-final.json .nyc_output/unit.json
          cp coverage/storybook/coverage-final.json .nyc_output/storybook.json
          # Generate merged reports in all required formats
          npx nyc report --temp-dir .nyc_output --report-dir coverage -r text -r json -r html -r json-summary
          # Enforce coverage thresholds on the merged result
          npx nyc check-coverage --temp-dir .nyc_output --statements 90 --branches 85 --functions 90 --lines 90

      # Post accessibility report link
      - name: Get PR number
        uses: jwalton/gh-find-current-pr@master
        id: findPr
        with:
          state: open
      - name: Accessibility Report Preview
        if: success() && steps.findPr.outputs.number
        uses: thollander/actions-comment-pull-request@v3
        with:
          pr-number: ${{ steps.findPr.outputs.number }}
          message: |
            Accessibility tests executed. Download the report [here](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).

      # Coverage report PR comment
      - name: Report Coverage
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: 'Marigold Code Coverage'
          pr-number: 'auto'
          json-summary-path: './coverage/coverage-summary.json'
          json-final-path: './coverage/coverage-final.json'

      # Coverage badge
      - name: Read coverage and prepare badge JSON
        id: prepare_badge
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const summaryPath = path.join(process.cwd(), 'coverage', 'coverage-summary.json');
          if (!fs.existsSync(summaryPath)) {
            console.error('coverage-summary.json not found at', summaryPath);
            process.exit(1);
          }
          const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));
          const pct = Number(summary?.total?.lines?.pct ?? 0);
          const message = pct.toFixed(0) + '%';
          let color = 'red';
          if (pct >= 90) color = 'brightgreen';
          else if (pct >= 80) color = 'green';
          else if (pct >= 65) color = 'orange';
          else if (pct >= 50) color = 'yellow';

          const badge = {
            schemaVersion: 1,
            label: 'Vitest',
            message,
            color,
            labelColor: 'black',
            namedLogo: 'vitest',
            logoColor: 'white'
          };
          const outDir = path.join(process.cwd(), 'artifacts');
          fs.mkdirSync(outDir, { recursive: true });
          const outFile = path.join(outDir, 'vitest-coverage-badge.json');
          fs.writeFileSync(outFile, JSON.stringify(badge));
          console.log('Badge JSON written to', outFile);

          // Also expose outputs
          const githubOutput = process.env.GITHUB_OUTPUT;
          if (githubOutput) {
            fs.appendFileSync(githubOutput, 'coverage_pct=' + pct + '\n');
            fs.appendFileSync(githubOutput, 'badge_path=' + outFile + '\n');
          }
          "

      - name: Upload badge JSON as artifact (for debugging)
        uses: actions/upload-artifact@v6
        with:
          name: vitest-coverage-badge
          path: artifacts/vitest-coverage-badge.json

      - name: Upload badge to Gist (only for main target)
        if: ${{ (github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main')) && (env.GIST_TOKEN != '' && env.GIST_ID != '') }}
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ secrets.GIST_ID }}
          filename: vitest-coverage-badge.json
          label: Vitest
          message: ${{ steps.prepare_badge.outputs.coverage_pct }}%
          color: >-
            ${{
              steps.prepare_badge.outputs.coverage_pct >= 90 && 'brightgreen' ||
              steps.prepare_badge.outputs.coverage_pct >= 80 && 'green' ||
              steps.prepare_badge.outputs.coverage_pct >= 65 && 'orange' ||
              steps.prepare_badge.outputs.coverage_pct >= 50 && 'yellow' ||
              'red'
            }}
          labelColor: black
          namedLogo: vitest
          logoColor: white
