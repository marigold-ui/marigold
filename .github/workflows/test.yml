name: Test

on: ['push']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4.2.0
      - name: Setup Node (using .node-version)
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm exec playwright --version)" >> $GITHUB_OUTPUT
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.playwright-version.outputs.version }}-${{ runner.os }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install
      - name: Run Unit Tests
        run: pnpm exec vitest run --project=unit-tests --reporter=blob --coverage
      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: blob-report-unit
          path: .vitest-reports
          retention-days: 1
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-unit
          path: coverage
          retention-days: 1

  storybook-tests:
    name: Storybook Tests
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4.2.0
      - name: Setup Node (using .node-version)
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm exec playwright --version)" >> $GITHUB_OUTPUT
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.playwright-version.outputs.version }}-${{ runner.os }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install
      - name: Run Storybook Tests
        run: pnpm exec vitest run --project=storybook-tests --reporter=blob --coverage
      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: blob-report-storybook
          path: .vitest-reports
          retention-days: 1
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-storybook
          path: coverage
          retention-days: 1
      - name: Upload Accessibility Report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: accessibility-report
          path: ./storybook/artifacts/accessibilityReport.html
          overwrite: 'true'

  coverage-report:
    name: Coverage Report
    needs: [unit-tests, storybook-tests]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      CI: true
      GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
      GIST_ID: ${{ secrets.GIST_ID }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4.2.0
      - name: Setup Node (using .node-version)
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install

      - name: Download blob reports
        uses: actions/download-artifact@v6
        with:
          pattern: blob-report-*
          path: .vitest-reports
          merge-multiple: true

      - name: Merge reports and generate coverage
        run: pnpm exec vitest --mergeReports --coverage

      - name: Get PR number
        uses: jwalton/gh-find-current-pr@master
        id: findPr
        with:
          state: open

      - name: Accessibility Report Preview
        if: success() && steps.findPr.outputs.number
        uses: thollander/actions-comment-pull-request@v3
        with:
          pr-number: ${{ steps.findPr.outputs.number }}
          message: |
            Accessibility tests executed. Download the report [here](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts).

      - name: 'Report Coverage'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: 'Marigold Code Coverage'
          pr-number: 'auto'
          json-summary-path: './coverage/coverage-summary.json'
          json-final-path: './coverage/coverage-final.json'

      - name: Read coverage and prepare badge JSON
        id: prepare_badge
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const summaryPath = path.join(process.cwd(), 'coverage', 'coverage-summary.json');
          if (!fs.existsSync(summaryPath)) {
            console.error('coverage-summary.json not found at', summaryPath);
            process.exit(1);
          }
          const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));
          const pct = Number(summary?.total?.lines?.pct ?? 0);
          const message = pct.toFixed(0) + '%';
          let color = 'red';
          if (pct >= 90) color = 'brightgreen';
          else if (pct >= 80) color = 'green';
          else if (pct >= 65) color = 'orange';
          else if (pct >= 50) color = 'yellow';

          const badge = {
            schemaVersion: 1,
            label: 'Vitest',
            message,
            color,
            labelColor: 'black',
            namedLogo: 'vitest',
            logoColor: 'white'
          };
          const outDir = path.join(process.cwd(), 'artifacts');
          fs.mkdirSync(outDir, { recursive: true });
          const outFile = path.join(outDir, 'vitest-coverage-badge.json');
          fs.writeFileSync(outFile, JSON.stringify(badge));
          console.log('Badge JSON written to', outFile);

          // Also expose outputs
          const githubOutput = process.env.GITHUB_OUTPUT;
          if (githubOutput) {
            fs.appendFileSync(githubOutput, 'coverage_pct=' + pct + '\n');
            fs.appendFileSync(githubOutput, 'badge_path=' + outFile + '\n');
          }
          "

      - name: Upload badge JSON as artifact (for debugging)
        uses: actions/upload-artifact@v6
        with:
          name: vitest-coverage-badge
          path: artifacts/vitest-coverage-badge.json

      - name: Upload badge to Gist (only for main target)
        if: ${{ (github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main')) && (env.GIST_TOKEN != '' && env.GIST_ID != '') }}
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ secrets.GIST_ID }}
          filename: vitest-coverage-badge.json
          label: Vitest
          message: ${{ steps.prepare_badge.outputs.coverage_pct }}%
          color: >-
            ${{
              steps.prepare_badge.outputs.coverage_pct >= 90 && 'brightgreen' ||
              steps.prepare_badge.outputs.coverage_pct >= 80 && 'green' ||
              steps.prepare_badge.outputs.coverage_pct >= 65 && 'orange' ||
              steps.prepare_badge.outputs.coverage_pct >= 50 && 'yellow' ||
              'red'
            }}
          labelColor: black
          namedLogo: vitest
          logoColor: white
